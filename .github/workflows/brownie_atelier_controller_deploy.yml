name: Brownie Atelier Controller Deploy
run-name: Brownie Atelier Controller Deploy!!!
# 役割分担: 関数アプリ等のリソースは Terraform で作成済み。このワークフローは zip デプロイ（アプリ中身の反映）のみ行う。
on:
    # 以下のブランチにプッシュされた際起動
    push:
        branches: ['develop','master']
    # Githubより手動で起動
    workflow_dispatch:

# azure/login@v2アクションはデフォルトでOIDC認証（IDトークン連携）を使うため、以下の権限が必要。
permissions:
  id-token: write      # （OIDCトークン必須！）
  contents: read       # （リポジトリクローンも必須）

jobs:

  Branch-Controll:
    runs-on: ubuntu-22.04
    steps:
      - name: ブランチより環境を選択 (現在のブランチ： ${{ github.ref }})
        id: branch_check
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "env_name=PRODUCT" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "env_name=TEST" >> $GITHUB_OUTPUT
          else
            echo "env_name=TEST" >> $GITHUB_OUTPUT
          fi
          
      - run: echo "環境名： ${{ steps.branch_check.outputs.env_name }}"
        
    outputs:
      env_name: ${{ steps.branch_check.outputs.env_name }}

  Brownie-Atelier-Controller-Deploy:
    # デプロイ手順参考: https://learn.microsoft.com/ja-jp/azure/azure-functions/functions-how-to-github-actions?tabs=linux%2Cpython&pivots=method-manual#tabpanel_2_python_windows
    needs: [Branch-Controll]
    runs-on: ubuntu-22.04
    environment:
      name: ${{ needs.Branch-Controll.outputs.env_name }}
    env:
      PYTHON_VERSION: '3.10'
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}

    steps:
      - run: echo "🎉 起動イベントの種類 (${{ github.event_name }})"
      - run: echo "🐧 github上のOSの種類 (${{ runner.os }})"
      - name: リポジトリ(${{ github.repository }})・ブランチ(${{ github.ref }})にチェックアウト
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: ワークスペースチェック
        run: |
          ls -a ${{ github.workspace }}

      #################################################
      # Azure Functions へ zip デプロイ（関数アプリは Terraform で作成済み）
      #################################################
      - name: Setup Python ${{ env.PYTHON_VERSION }} Environment
        uses: actions/setup-python@v5
        with:
            python-version: ${{ env.PYTHON_VERSION }}

      - name: Build zip package
        run: |
          zip -r function.zip .

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az version

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 関数アプリに zip デプロイ
        run: |
          az functionapp deployment source config-zip \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --src function.zip \
            --timeout 600 \
            --build-remote true
